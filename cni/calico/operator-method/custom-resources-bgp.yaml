# This section includes base Calico installation configuration.
# For more information, see: https://docs.tigera.io/calico/latest/reference/installation/api#operator.tigera.io/v1.Installation
apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  calicoNetwork:
    bgp: Enabled
    ipPools:
    - cidr: 10.244.0.0/24   # Pod CIDR
      encapsulation: None   # "IPIPCrossSubnet", "IPIP", "VXLAN", "VXLANCrossSubnet", "None"
      natOutgoing: Enabled  # Enable NAT for outbound traffic.
      nodeSelector: all()   # Apply to all nodes.

  # Enable BGP configuration for DirectPath.
  nodeUpdateStrategy:
    rollingUpdate:
      maxUnavailable: 25%            # Configure rolling updates.

  # Optimize for performance with DirectPath.
  flexVolumePath: /usr/libexec/kubernetes/kubelet-plugins/volume/exec

  # # Resource configuration to ensure Calico runs smoothly.
  # resources:
  #   calicoNode:
  #     requests:
  #       memory: 250Mi
  #       cpu: 100m
  #     limits:
  #       memory: 500Mi
  #       cpu: 250m

  # Enable WireGuard for encrypted direct communication (optional).
  #wireguardEnabled: false             # Set to true if encryption is required.

  # bgpConfiguration:
  #   nodeToNodeMeshEnabled: true
  #   asNumber: 64512 # Use appropriate ASN
  # felixConfiguration:
  #   metadataServerType: Kubernetes
  #   ipipEnabled: false # Avoid IP-in-IP if not required
  #   vxlanEnabled: false # Enable VXLAN if using VXLANCrossSubnet
  #   wireguardEnabled: false # Disable if not using WireGuard
  #   bpfEnabled: true # Enable eBPF if supported
  #   bpfExternalServiceMode: Tunnel # Set to 'Tunnel' for clusterIP routing
  #   bpfLogLevel: Off
  #   xdpEnabled: true # Enable XDP for packet processing acceleration
  # prometheusMetrics:
  #   enabled: true
  #   port: 9091
  # typha:
  #   enabled: true
  #   replicas: 2

---
# This section configures the Calico API server.
# For more information, see: https://docs.tigera.io/calico/latest/reference/installation/api#operator.tigera.io/v1.APIServer
apiVersion: operator.tigera.io/v1
kind: APIServer
metadata:
  name: default
spec: {}

